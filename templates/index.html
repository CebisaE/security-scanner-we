<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Mini Vulnerability Scanner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<h1>Mini Vulnerability Scanner</h1>

<input type="text" id="url" placeholder="https://example.com" required>

<button onclick="scanWebsite()">Scan</button>

<div id="loading" style="display:none;">Scanning...</div>

<div class="results" id="output"></div>

<hr>

<div class="history">
    <h3>📜 Scan History</h3>
    <ul id="historyList"></ul>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
